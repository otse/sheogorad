		@font-face {

<style>
	@import url('https://fonts.googleapis.com/css2?family=Eagle+Lake&family=Itim&family=Macondo&display=swap');

	* {
		font-family: 'Pelagiad';
		font-size: 16px;
		font-weight: 100;
	}

	body {
		display: flex;
		flex-direction: column;
		justify-content: center;
		align-items: center;
		background-color: #1e1e1e;
		background: url(https://cdna.artstation.com/p/assets/images/images/022/972/972/large/dominik-zdenkovic-20191222-thu-bitter-coast3.jpg?1577548887);
		background-size: cover;
		background-repeat: no-repeat;
		background-attachment: fixed;
		width: 100%;
		height: 100%;
		box-sizing: border-box;
		color: #f300ff;
		margin: 0;
		padding: 50px;
	}

	:root {
		/* muted light tones for stone */
		--region-ascadian-isles-x: #ccd4c1;
		--region-bitter-coast-x: #c3d7cd;
		--region-west-gash-x: #d5cfc2;
		--region-ashlands-x: #d98659;
		--region-molag-amur-x: #d98659;
		--region-azura-s-coast-x: #ccdcd7;
		--region-grazelands-x: #d1d7c8;
		--region-sheogorad-x: #c162bc;

		--dark-text: #2e3132;
		--text-blue: #cacaca;
		--title-bar-gradient-color: rgb(123 124 125 / 50%);
	}

	h0 {}



	.nav-buttons {
		display: flex;
		gap: 8px;
		flex-shrink: 0;
		align-items: flex-start;
		flex-direction: row;
	}

	.nav-buttons button {
		background-color: rgba(0, 0, 0, 0.6);
	}

	.nav-buttons .mw-menu-button.muted {
		opacity: 0.6;
	}

	nav {
		width: 100%;
		box-sizing: border-box;
		padding: 12px;
		margin-bottom: 10px;
		display: flex;
		align-items: center;
		justify-content: space-between;
		flex-direction: row-reverse;
		gap: 16px;
	}
</style>

		<div id="generationDialog" stone-user-interface>
			<h2>Sheogorad Options</h2>
			<label for="islandName">Name for this generation:</label>
			<input type="text" id="islandName" placeholder="Slavewind" value="Slavewind">

			<label for="treeStyle">Tree Style:</label>
			<select id="treeStyle">
				<option value="oak">Oak</option>
				<option value="pine">Pine</option>

			</select>

			<label>

				Wild Grass

			<button onclick="Sheogorad.generate()">Generate</button>
