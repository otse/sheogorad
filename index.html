<style>
	@import url('https://fonts.googleapis.com/css2?family=Eagle+Lake&family=Itim&family=Macondo&display=swap');

	* {
		font-family: 'Pelagiad';
		font-size: 16px;
		font-weight: 100;
	}

	body {
		display: flex;
		flex-direction: column;
		justify-content: center;
		align-items: center;
		background-color: #1e1e1e;
		background: url(img/mica-olsson-seydaneen-mrenders-010-jpeg.jpg);
		-webkit-backdrop-filter: blur(2px);
		backdrop-filter: blur(2px);
		background-size: cover;
		background-repeat: no-repeat;
		background-attachment: fixed;
		width: 100%;
		height: 100%;
		box-sizing: border-box;
		color: #e0e0e0;
		margin: 0;
		padding: 50px;
	}

	:root {
		/* muted light tones for darkstone */
		--region-ascadian-isles-x: #ccd4c1;
		--region-bitter-coast-x: #c3d7cd;
		--region-west-gash-x: #d5cfc2;
		--region-ashlands-x: #d98659;
		--region-molag-amur-x: #d98659;
		--region-azura-s-coast-x: #ccdcd7;
		--region-grazelands-x: #d1d7c8;
		--region-sheogorad-x: #c162bc;

		--text-blue: #6cacd5;
		--title-bar-gradient-color: rgb(133 136 141 / 50%);
	}

	h0 {}

	

	.nav-buttons {
		display: flex;
		gap: 8px;
		flex-shrink: 0;
		align-items: flex-start;
		flex-direction: row;
	}

	.nav-buttons button {
		background-color: rgba(0, 0, 0, 0.6);
	}

	.nav-buttons .mw-menu-button.muted {
		opacity: 0.6;
	}

	nav {
		width: 100%;
		box-sizing: border-box;
		padding: 12px;
		margin-bottom: 10px;
		display: flex;
		align-items: center;
		justify-content: space-between;
		flex-direction: row-reverse;
		gap: 16px;
	}

	
</style>
